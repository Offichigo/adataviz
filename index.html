<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-onglet-wc.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <title>WCdex Nantes</title>
  </head>
  <body>
    <header>
      <img
        id="logo"
        src="/WCdex logo.png"
        alt="Logo du site WCdex écrit dans le style pokemon"
      />
      <h1>Pokédex wc public de Nantes</h1>
      <h2>Recherche</h2>
      <div class="search-wrap">
        <input
          id="search"
          type="text"
          placeholder="Entrez le nom du quartier"
        />
      </div>
    </header>
    <main>
      <section id="map" style="width: 100%; height: 40vh"></section>
      <section id="card-toilets"></section>

      <div class="button">
        <button class="pokeball-btn" id="prev">&laquo; RETOUR</button>
        <span type="number" id="page-number"></span>
        <button class="pokeball-btn" id="next">SUIVANT &raquo;</button>
      </div>
    </main>

    <footer>
      <h4>WCdex Nantes · Données data.nantesmetropole.fr · Off Perianin</h4>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
